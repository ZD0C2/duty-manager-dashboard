<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Duty Manager">
<meta name="theme-color" content="#0f172a">
<title>Loading Duty Manager...</title>
<style>
body { margin: 0; padding: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
.loader { color: #fff; text-align: center; }
.loader h1 { font-size: 24px; margin: 0 0 20px; }
.spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,.2); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="loader">
<h1>Duty Manager</h1>
<div class="spinner"></div>
<p style="color: rgba(255,255,255,.6); margin-top: 20px; font-size: 14px;">Loading dashboard...</p>
</div>
<iframe id="dashboard" style="display:none;width:100%;height:100%;border:none;" title="Duty Manager Dashboard"></iframe>
<script>
fetch('duty_manager_dashboard_ipad_safe.html')
  .then(r => r.text())
  .then(html => {
    var iframe = document.getElementById('dashboard');
    iframe.style.display = 'block';
    document.querySelector('.loader').style.display = 'none';
    iframe.srcdoc = html;
  })
  .catch(e => {
    document.querySelector('.loader').innerHTML = '<h1>Error</h1><p>Could not load dashboard</p>';
  });
</script>
</body>
</html>
